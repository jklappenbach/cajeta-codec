# CI + release for the cajeta-codec library (.cja).
#
# Unlike the cajeta compiler's release (which cross-builds binaries), this is a
# pure-Cajeta library: CI installs a published cajeta toolchain, builds the codec
# .cja + the cajeta-unit dependency, runs the test suite (and the GPU-decode
# oracle on the CPU backend), and — on a v* tag — publishes the built .cja as a
# GitHub Release asset.
#
# Triggers:
#   - push to main / PR        → build + test (no publish)
#   - push a `v*` tag          → build + test + publish the Release
#   - workflow_dispatch        → dry-run (build+test) or production (also tags +
#                                publishes, reading VERSION)
#
# TOOLCHAIN DEPENDENCY (important): the codec's typed facades (Protobuf/Ion/Avro
# parse<T> + toBytes<T>) require the codec *synthesizers*, which live in cajeta
# `main` but are NOT in any published release yet (latest is v0.7.1). CI will be
# fully green only once a cajeta release that includes them ships — then bump
# CAJETA_VERSION below. Until then the pure-Cajeta paths (columnar/Parquet/ORC)
# build, but the typed-codec tests need the newer toolchain.

name: release

on:
  push:
    # Per-commit CI on main is intentionally disabled until CAJETA_VERSION points
    # at a release containing the codec synthesizers (see note above) — otherwise
    # every push would go red on the typed-codec tests. Uncomment then:
    # branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Release mode'
        required: true
        type: choice
        default: 'dry-run'
        options: [dry-run, production]

permissions:
  contents: write   # publish the Release on a tag / production run

env:
  # A published cajeta toolchain that contains the codec synthesizers. Bump when
  # the next cajeta release ships them. Must match a release tag of jklappenbach/cajeta.
  CAJETA_VERSION: v0.7.1

jobs:
  build-test:
    name: build + test (x86_64-linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cajeta-codec
        uses: actions/checkout@v4

      - name: Checkout cajeta-unit (test framework dependency)
        uses: actions/checkout@v4
        with:
          repository: jklappenbach/cajeta-unit
          path: cajeta-unit-dep

      - name: Install cajeta toolchain (${{ env.CAJETA_VERSION }})
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download "$CAJETA_VERSION" --repo jklappenbach/cajeta \
            --pattern 'cajeta_*_amd64.deb' --dir /tmp
          sudo apt-get update
          sudo apt-get install -y /tmp/cajeta_*_amd64.deb
          cajeta --version || cajeta version || true

      - name: Run the codec test suite
        env:
          # run-tests.sh defaults UNIT_REPO to ../cajeta-unit relative to the repo.
          UNIT_REPO: ${{ github.workspace }}/cajeta-unit-dep
        run: ./run-tests.sh

      - name: Run the GPU-decode oracle (CPU backend)
        run: ./run-gpu-decode.sh cpu

      - name: Build the release .cja
        id: build
        run: |
          set -euo pipefail
          VERSION="$(cat VERSION)"
          out="$(mktemp -d)"
          cajeta --emit=cja -o "$out/dev.cajeta.codec-${VERSION}.cja" \
            dev.cajeta.codec.protobuf.Protobuf.run src/main/cajeta "$out"
          mkdir -p dist
          cp "$out/dev.cajeta.codec-${VERSION}.cja" dist/
          echo "artifact=dist/dev.cajeta.codec-${VERSION}.cja" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload .cja as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cajeta-codec-${{ steps.build.outputs.version }}
          path: ${{ steps.build.outputs.artifact }}

      # Publish a GitHub Release only on a v* tag push, or a production dispatch.
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.mode == 'production')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', steps.build.outputs.version) }}
          name: cajeta-codec ${{ steps.build.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.build.outputs.artifact }}

      # Signed publish to the Olla registry (olla.cajeta.dev). Requires the
      # OLLA_* repo/org secrets; see cajeta/docs/olla-ci-publish.md.
      - name: Publish to Olla
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.mode == 'production')
        uses: jklappenbach/cajeta/.github/actions/olla-publish@main
        with:
          cja-path: ${{ steps.build.outputs.artifact }}
          version: ${{ steps.build.outputs.version }}
          token: ${{ secrets.OLLA_TOKEN }}
          signing-key-pem: ${{ secrets.OLLA_SIGNING_KEY_PEM }}
          signing-key-id: ${{ secrets.OLLA_SIGNING_KEY_ID }}
